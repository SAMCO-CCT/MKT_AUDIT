services:
  postgres:
    image: postgres:16-alpine
    container_name: samco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydbname
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samco-nextjs
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env.local # 👈 บอกให้ Docker ไปแอบอ่านค่าจากไฟล์ .env มาใช้ให้เลยอัตโนมัติ

volumes:
  postgres_data: